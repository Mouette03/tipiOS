# TipiOS — Configuration hostapd pour le portail de premier démarrage
# Référence : même approche que RaspAP (country_code dans hostapd = seule méthode
# fiable sur brcmfmac RPi 4/5 pour que les beacon frames soient émises).

interface=wlan0
driver=nl80211

# Identité du réseau
ssid=TipiSetup

# Domaine réglementaire (OBLIGATOIRE sur brcmfmac pour lever le flag no-ir)
country_code=US
ieee80211d=1

# Bande 2.4 GHz, canal 6 (universellement autorisé, même sans code pays)
hw_mode=g
channel=6

# 802.11n (HT) — améliore la compatibilité et les performances
ieee80211n=1
wmm_enabled=1

# Sécurité WPA2-Personal
auth_algs=1
wpa=2
wpa_passphrase=TipiSetup2024!
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# Logs vers stdout (redirigé dans /boot/firmware/tipi-setup.log par systemd)
logger_stdout=-1
logger_stdout_level=0
