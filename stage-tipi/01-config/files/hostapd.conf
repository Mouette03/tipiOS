# TipiOS — Configuration hostapd pour le portail de premier démarrage
# Réseau ouvert (pas de mot de passe) : n'importe quel appareil peut se connecter
# et est redirigé vers le portail captif. Même approche que RaspAP et les portails
# hôteliers — la sécurité est assurée par le portail, pas par le WiFi.

interface=wlan0
driver=nl80211

# Identité du réseau
ssid=TipiSetup

# Domaine réglementaire (OBLIGATOIRE sur brcmfmac pour lever le flag no-ir)
country_code=US
ieee80211d=1

# Bande 2.4 GHz, canal 6 (universellement autorisé)
hw_mode=g
channel=6

# 802.11n
ieee80211n=1
wmm_enabled=1

# Réseau ouvert — pas de chiffrement
auth_algs=1
wpa=0

# Logs vers stdout (redirigé dans /boot/firmware/tipi-setup.log par systemd)
logger_stdout=-1
logger_stdout_level=0
