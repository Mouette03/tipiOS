name: Build TipiOS Image

on:
  push:
    branches: ['**']          # toutes les branches
  pull_request:
    branches: ['**']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag de la release (ex: v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pi-gen dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-binfmt \
            debootstrap zerofree zip dosfstools libcap2-bin grep rsync \
            xz-utils file git curl bc xxd kpartx libarchive-tools arch-test \
            bmap-tools kmod e2fsprogs pigz

      - name: Enable binfmt_misc for ARM emulation
        run: |
          # Charger le module binfmt_misc si pas déjà actif
          sudo modprobe binfmt_misc 2>/dev/null || true
          # Enregistrer les binaires ARM via qemu-user-binfmt
          sudo systemctl restart systemd-binfmt 2>/dev/null || true
          # Vérifier que qemu-arm et qemu-aarch64 sont enregistrés
          ls /proc/sys/fs/binfmt_misc/qemu-aarch64 2>/dev/null && \
            echo "binfmt ARM64 OK" || \
            sudo /usr/lib/binfmt.d/qemu-aarch64 2>/dev/null || true
          ls /proc/sys/fs/binfmt_misc/qemu-arm 2>/dev/null && \
            echo "binfmt ARM OK" || true

      - name: Clone pi-gen (arm64 branch for 64-bit images)
        run: |
          git clone --depth=1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen

      - name: Copy custom stage into pi-gen
        run: |
          cp -r stage-tipi /tmp/pi-gen/stage-tipi
          # Bit exécutable sur les scripts (non préservé par git sur Windows)
          chmod +x /tmp/pi-gen/stage-tipi/prerun.sh
          chmod +x /tmp/pi-gen/stage-tipi/01-config/00-run.sh
          chmod +x /tmp/pi-gen/stage-tipi/01-config/files/start.sh
          # Skip intermediate images to speed up the build
          touch /tmp/pi-gen/stage0/SKIP_IMAGES
          touch /tmp/pi-gen/stage1/SKIP_IMAGES
          touch /tmp/pi-gen/stage2/SKIP_IMAGES

      - name: Create pi-gen config
        run: |
          {
            echo 'IMG_NAME="tipiOS"'
            echo 'RELEASE="trixie"'
            echo 'DEPLOY_COMPRESSION="xz"'
            echo 'TARGET_HOSTNAME="tipisetup"'
            echo 'FIRST_USER_NAME="tipi"'
            echo 'FIRST_USER_PASS="changeme"'
            echo 'ENABLE_SSH=1'
            echo 'LOCALE_DEFAULT="fr_FR.UTF-8"'
            echo 'KEYBOARD_KEYMAP="fr"'
            echo 'KEYBOARD_LAYOUT="French"'
            echo 'TIMEZONE_DEFAULT="Europe/Paris"'
            echo 'DISABLE_FIRST_BOOT_USER_RENAME=1'
            echo 'DISABLE_FIRST_BOOT_WIZARD=1'
            echo 'STAGE_LIST="stage0 stage1 stage2 stage-tipi"'
          } > /tmp/pi-gen/config

      - name: Build image
        run: |
          cd /tmp/pi-gen
          echo "=== Config utilisée ==="
          cat config
          echo "=== Stages disponibles ==="
          ls -la /tmp/pi-gen/
          echo "=== Contenu stage-tipi ==="
          find /tmp/pi-gen/stage-tipi -type f | sort
          echo "=== Lancement build ==="
          sudo bash build.sh 2>&1
          echo "=== Build terminé (code $?) ==="
          echo "=== Contenu work/ ==="
          ls -lhR /tmp/pi-gen/work/ 2>/dev/null | head -80 || echo "work/ absent"
          echo "=== Contenu deploy/ ==="
          ls -lhR /tmp/pi-gen/deploy/ 2>/dev/null || echo "deploy/ absent"
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Show build log on failure
        if: failure()
        run: |
          echo '=== Dernières lignes du log pi-gen ==='
          find /tmp/pi-gen -name '*.log' -exec tail -50 {} \; 2>/dev/null || true
          echo '=== Contenu deploy/ ==='
          ls -lhR /tmp/pi-gen/deploy/ 2>/dev/null || echo 'deploy/ absent'
          echo '=== Stages executés ==='
          ls /tmp/pi-gen/work/ 2>/dev/null || true

      - name: List generated artifacts
        run: ls -lh /tmp/pi-gen/deploy/ || echo "Aucun artifact généré"

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tipiOS-${{ github.run_number }}-${{ github.sha }}
          path: /tmp/pi-gen/deploy/*.img.xz
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || format('build-{0}', github.run_number) }}
          name: TipiOS Build ${{ github.run_number }}
          body: |
            ## TipiOS — Image Raspberry Pi clé en main

            ### Flashage
            1. Téléchargez le fichier `.img.xz`
            2. Flashez avec [Raspberry Pi Imager](https://www.raspberrypi.com/software/) ou `dd`
            3. Insérez la carte SD dans votre RPi et démarrez

            ### Premier démarrage
            - **WiFi hotspot** : connectez-vous au réseau `TipiSetup` (mot de passe : `TipiSetup2024!`)
            - **Accès portail** : ouvrez `http://tipisetup.local` ou `http://10.42.0.1`
            - Configurez votre réseau, SSH, hostname, puis lancez l'installation

            ### Matériel recommandé
            - Raspberry Pi 4 ou 5 (4 Go RAM minimum)
            - Carte SD 32 Go minimum

            **Commit** : ${{ github.sha }}
          files: /tmp/pi-gen/deploy/*.img.xz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
