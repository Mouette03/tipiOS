name: Build RuntipiOS Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag pour publier (ex: v1.0.0) — laisser vide pour un build de test'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pi-gen dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static \
            debootstrap zerofree zip dosfstools libcap2-bin grep rsync \
            xz-utils file git curl bc xxd kpartx libarchive-tools arch-test \
            bmap-tools kmod e2fsprogs pigz

      - name: Check binfmt ARM64 registration
        run: |
          ls /proc/sys/fs/binfmt_misc/qemu-aarch64 && echo "binfmt ARM64 OK" || echo "WARNING: ARM64 not registered"
          ls /proc/sys/fs/binfmt_misc/qemu-arm && echo "binfmt ARM OK" || echo "WARNING: ARM not registered"

      - name: Clone pi-gen (arm64 branch for 64-bit images)
        run: |
          git clone --depth=1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen

      - name: Copy custom stage into pi-gen
        run: |
          cp -r stage-tipi /tmp/pi-gen/stage-tipi
          # Executable bit on scripts (not preserved by git on Windows)
          chmod +x /tmp/pi-gen/stage-tipi/prerun.sh
          chmod +x /tmp/pi-gen/stage-tipi/01-config/00-run.sh
          chmod +x /tmp/pi-gen/stage-tipi/01-config/files/start.sh
          # Skip intermediate images to speed up the build
          touch /tmp/pi-gen/stage0/SKIP_IMAGES
          touch /tmp/pi-gen/stage1/SKIP_IMAGES
          touch /tmp/pi-gen/stage2/SKIP_IMAGES

      - name: Create pi-gen config
        run: |
          {
            echo 'IMG_NAME="RuntipiOS"'
            echo 'RELEASE="trixie"'
            echo 'DEPLOY_COMPRESSION="xz"'
            echo 'TARGET_HOSTNAME="tipisetup"'
            echo 'FIRST_USER_NAME="tipi"'
            echo 'FIRST_USER_PASS="tipipassword"'
            echo 'ENABLE_SSH=1'
            echo 'LOCALE_DEFAULT="en_GB.UTF-8"'
            echo 'KEYBOARD_KEYMAP="us"'
            echo 'KEYBOARD_LAYOUT="English (US)"'
            echo 'TIMEZONE_DEFAULT="UTC"'
            echo 'WPA_COUNTRY="US"'
            echo 'DISABLE_FIRST_BOOT_USER_RENAME=1'
            echo 'DISABLE_FIRST_BOOT_WIZARD=1'
            echo 'STAGE_LIST="stage0 stage1 stage2 stage-tipi"'
          } > /tmp/pi-gen/config

      - name: Build image
        run: |
          cd /tmp/pi-gen
          echo "=== Config in use ==="
          cat config
          echo "=== Available stages ==="
          ls -la /tmp/pi-gen/
          echo "=== stage-tipi contents ==="
          find /tmp/pi-gen/stage-tipi -type f | sort
          echo "=== Starting build ==="
          if ! sudo bash build.sh; then
            echo "=== BUILD FAILED ==="
            echo "=== deploy/ contents ==="
            ls -lhR /tmp/pi-gen/deploy/ 2>/dev/null || echo "deploy/ not found"
            exit 1
          fi
          echo "=== Build successful ==="
          echo "=== deploy/ contents ==="
          ls -lhR /tmp/pi-gen/deploy/
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Show build log on failure
        if: failure()
        run: |
          echo '=== Last lines of pi-gen log ==='
          find /tmp/pi-gen -name '*.log' -exec tail -50 {} \; 2>/dev/null || true
          echo '=== deploy/ contents ==='
          ls -lhR /tmp/pi-gen/deploy/ 2>/dev/null || echo 'deploy/ not found'
          echo '=== Executed stages ==='
          ls /tmp/pi-gen/work/ 2>/dev/null || true

      - name: List generated artifacts
        run: ls -lh /tmp/pi-gen/deploy/ || echo "No artifacts generated"

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RuntipiOS-${{ github.run_number }}-${{ github.sha }}
          path: /tmp/pi-gen/deploy/
          retention-days: 30

      - name: Attach image to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event.inputs.release_tag != '' && github.event.inputs.release_tag != null)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
          REF_TAG: ${{ github.ref_name }}
        run: |
          # Validation stricte du tag (sécurité : évite l'injection de commandes)
          RAW_TAG="${INPUT_TAG:-$REF_TAG}"
          if ! echo "$RAW_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: tag invalide : '$RAW_TAG' (attendu : vX.Y.Z)"
            exit 1
          fi
          TAG="$RAW_TAG"
          # Récupère les 20 derniers commits pour le changelog (fetch-depth: 0 requis)
          CHANGELOG=$(git log --oneline -20 --pretty=format:'- %s (%h)' 2>/dev/null || echo '- (no changelog available)')
          BODY="## RuntipiOS — Ready-to-flash Raspberry Pi image

          ### Flashing
          1. Download the \`.img.xz\` file
          2. Flash with [Raspberry Pi Imager](https://www.raspberrypi.com/software/) or \`dd\`
          3. Insert the SD card into your RPi and power on

          ### First boot
          - **WiFi hotspot**: connect to the \`TipiSetup\` network (no password)
          - **Ethernet**: if connected via cable, access directly via \`http://tipisetup.local:8080\`
          - **Portal**: open \`http://tipisetup.local:8080\` (Ethernet/WiFi) or \`http://10.42.0.1:8080\` (hotspot only)
          - Configure your network, SSH, hostname, then launch the installation

          ### Recommended hardware
          - Raspberry Pi 4 ou 5
          - 16 GB SD card minimum (32 GB recommended)

          ### Changes
          ${CHANGELOG}

          **Commit**: ${{ github.sha }}"

          # Vérifie qu'il y a bien des fichiers image à uploader
          shopt -s nullglob
          FILES=(/tmp/pi-gen/deploy/*.img*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "ERROR: aucun fichier image trouvé dans /tmp/pi-gen/deploy/"
            exit 1
          fi

          # Crée la release si elle n'existe pas encore (pointe sur le bon commit)
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "${{ github.sha }}" \
            --title "RuntipiOS $TAG" \
            --notes "$BODY" \
            "${FILES[@]}" 2>/dev/null || true
          # Si la release existait déjà (créée via GitHub), ajoute/remplace les assets
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            "${FILES[@]}"
          # Met toujours à jour la description de la release avec le texte du workflow
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "RuntipiOS $TAG" \
            --notes "$BODY"
