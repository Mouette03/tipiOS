name: Update Python notices

on:
  push:
    paths:
      - 'stage-tipi/01-config/files/app/requirements.txt'
  workflow_dispatch:

jobs:
  update-notices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r stage-tipi/01-config/files/app/requirements.txt
          pip install pip-licenses

      - name: Generate Python license table
        run: |
          TABLE=$(pip-licenses --format=markdown --with-urls \
            --packages flask werkzeug jinja2 markupsafe click itsdangerous \
            | tail -n +2)   # supprime le header pip-licenses

          DATE=$(date +%Y-%m-%d)

          # Remplace le bloc entre les balises dans NOTICES.md
          awk -v table="$TABLE" -v date="$DATE" '
            /<!-- BEGIN PYTHON LICENSES -->/ {
              print
              print "> This section is automatically regenerated by the `update-notices` GitHub Actions workflow."
              print "> Last updated: " date
              print ""
              print table
              skip=1
              next
            }
            /<!-- END PYTHON LICENSES -->/ { skip=0 }
            !skip { print }
          ' NOTICES.md > NOTICES.tmp && mv NOTICES.tmp NOTICES.md

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No change" && exit 0
          git add NOTICES.md
          git commit -m "chore: update Python license notices"
          git push
